# Render.com — Moonlace API
# Blueprint Path: Moonlace2/render.yaml

services:
  - type: web
    name: moonlace-api
    runtime: node
    plan: free
    rootDir: Moonlace2
    buildCommand: NPM_CONFIG_PRODUCTION=false npm install && npm run db:generate && npm run db:push && npm run db:seed && mkdir -p apps/api/dist && npx esbuild apps/api/src/index.ts --bundle --platform=node --target=node20 --outfile=apps/api/dist/index.js --format=cjs --packages=external
    startCommand: node apps/api/dist/index.js
    healthCheckPath: /v1/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: WEB_URL
        value: https://moonlace.vercel.app
      - key: S3_BUCKET
        value: moonlace-media
