# Render.com — бесплатный хостинг API Moonlace
# GitHub: zxckatori/Moonlace → Blueprint Path: Moonlace2/render.yaml
services:
  - type: web
    name: moonlace-api
    runtime: node
    plan: free
    rootDir: Moonlace2
    buildCommand: npm install && npm run db:generate && npm run db:push && npm run db:seed && npm run build -w @moonlace/api
    startCommand: npm run start -w @moonlace/api
    healthCheckPath: /v1/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: WEB_URL
        value: https://moonlace.vercel.app
      - key: S3_BUCKET
        value: moonlace-media
